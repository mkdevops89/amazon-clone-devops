apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secrets
  namespace: devsecops
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: devsecops/amazon-app/db-secrets
  data:
  - secretKey: db_password
    remoteRef:
      key: arn:aws:secretsmanager:us-east-1:406312601212:secret:rds!db-fe8e7c13-2c4f-48a7-88a1-2cb060cddcda-4Jnfwp
      property: password
