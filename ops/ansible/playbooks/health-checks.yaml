---
- name: API and Frontend Health Checks (Post-Deployment Auditing)
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    # Use the public endpoints managed by our ALB and Route53
    base_url: "https://www.devcloudproject.com"
    api_url: "https://api.devcloudproject.com/api"
    jenkins_url: "https://jenkins.devcloudproject.com"
    # Update this to your specific Grafana Ingress URL or LoadBalancer IP
    grafana_url: "http://localhost:3000/login" 
    argocd_url: "https://argocd.devcloudproject.com"
    # Update these to your actual RDS, MQ, and Memcached endpoints
    rds_host: "database-1.cluster-xxx.us-east-1.rds.amazonaws.com"
    rds_port: 3306
    rabbitmq_host: "b-xxx.mq.us-east-1.amazonaws.com"
    rabbitmq_port: 5671
    redis_host: "redis-cluster.xxx.cfg.use1.cache.amazonaws.com"
    redis_port: 6379

  tasks:
    - name: Test Frontend Homepage (Expect HTTP 200)
      uri:
        url: "{{ base_url }}"
        return_content: yes
        validate_certs: no
        status_code: 200
      register: frontend_result

    - name: Verify Frontend content loads properly
      assert:
        that: "'amazon-orange' in frontend_result.content or 'amazon-blue' in frontend_result.content"
        fail_msg: "Frontend returned 200 OK, but expected CSS classes were missing. Is it serving the correct build?"

    - name: Test Backend API Products Endpoint (Expect HTTP 200)
      uri:
        url: "{{ api_url }}/products"
        return_content: yes
        validate_certs: no
        status_code: 200
      register: api_result

    - name: Verify API returns JSON data
      assert:
        that: "api_result.json | type_debug == 'list'"
        fail_msg: "API did not return a valid JSON list of products."

    - name: Test Jenkins CI/CD Portal (Expect HTTP 200)
      uri:
        url: "{{ jenkins_url }}/login"
        return_content: no
        validate_certs: no
        status_code: 200

    - name: Test Grafana Dashboard (Expect HTTP 200)
      uri:
        url: "{{ grafana_url }}"
        return_content: no
        validate_certs: no
        status_code: 200
      ignore_errors: yes

    - name: Test ArgoCD UI (Expect HTTP 200)
      uri:
        url: "{{ argocd_url }}"
        return_content: no
        validate_certs: no
        status_code: 200
      ignore_errors: yes

    - name: Test RDS MySQL Connectivity (Port Check)
      wait_for:
        host: "{{ rds_host }}"
        port: "{{ rds_port }}"
        timeout: 5
      ignore_errors: yes

    - name: Test Amazon MQ (RabbitMQ) Connectivity (Port Check)
      wait_for:
        host: "{{ rabbitmq_host }}"
        port: "{{ rabbitmq_port }}"
        timeout: 5
      ignore_errors: yes

    - name: Test Redis Connectivity (Port Check)
      wait_for:
        host: "{{ redis_host }}"
        port: "{{ redis_port }}"
        timeout: 5
      ignore_errors: yes

    - name: Print Audit Summary
      debug:
        msg: "Audit Complete! Frontend, Backend API, Jenkins, Grafana, ArgoCD, and Infrastructure boundaries tested."
