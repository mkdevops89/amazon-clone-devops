---
- name: Hardening and configuring the Bastion (Admin) Server
  # We use the dynamic tag grouping generated by aws_ec2.yaml
  hosts: tag_Name_ansible_bastion
  become: yes
  tasks:
    - name: Update all packages
      dnf:
        name: "*"
        state: latest

    - name: Install essential DevOps tools, Docker, and CloudWatch Agent
      dnf:
        name:
          - jq
          - git
          - wget
          - htop
          - fail2ban
          - docker
          - amazon-cloudwatch-agent
        state: present

    - name: Start and enable fail2ban
      systemd:
        name: fail2ban
        state: started
        enabled: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Start and enable CloudWatch Agent
      systemd:
        name: amazon-cloudwatch-agent
        state: started
        enabled: yes

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart SSH
      
    - name: Configure Firewall (Firewalld - AL2023 native alternative to UFW)
      dnf:
        name: firewalld
        state: present

    - name: Start and enable Firewall
      systemd:
        name: firewalld
        state: started
        enabled: yes

    - name: Create 'admin' user with sudo privileges and SSH keys
      user:
        name: admin
        groups: wheel
        append: yes
        state: present
        create_home: yes
        generate_ssh_key: yes
        ssh_key_bits: 4096
        ssh_key_file: .ssh/id_rsa

    - name: Set up passwordless sudo for admin user
      copy:
        content: "admin ALL=(ALL) NOPASSWD:ALL"
        dest: /etc/sudoers.d/admin
        validate: 'visudo -cf %s'
        mode: 0440

    - name: Install kubectl
      get_url:
        url: "https://s3.us-west-2.amazonaws.com/amazon-eks/1.30.4/2024-09-11/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm
      unarchive:
        src: "https://get.helm.sh/helm-v3.15.4-linux-amd64.tar.gz"
        dest: /tmp
        remote_src: yes
    
    - name: Move Helm to bin
      command: mv /tmp/linux-amd64/helm /usr/local/bin/helm
      args:
        creates: /usr/local/bin/helm

  handlers:
    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted
