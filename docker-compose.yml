services:
  # ==========================================
  # Frontend Application (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    image: ${DOCKER_USERNAME:-amazon-dev}/amazon-frontend:latest
    container_name: amazon-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    depends_on:
      - backend
    networks:
      - app-network

  # ==========================================
  # Backend Application (Spring Boot)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-amazon-dev}/amazon-backend:latest
    container_name: amazon-backend
    ports:
      - "8080:8080"
    environment:
      # Connect directly to AWS RDS provisioned by Terraform
      - SPRING_DATASOURCE_URL=jdbc:mysql://${TF_VAR_RDS_ENDPOINT:-localhost}:3306/amazonlike_db
      - SPRING_DATASOURCE_USERNAME=${TF_VAR_DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${TF_VAR_DB_PASSWORD}
      
      # Connect directly to Amazon MQ provisioned by Terraform
      - SPRING_RABBITMQ_HOST=${TF_VAR_MQ_ENDPOINT:-localhost}
      - SPRING_RABBITMQ_USERNAME=${TF_VAR_MQ_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${TF_VAR_MQ_PASSWORD}
      
      # Connect directly to AWS ElastiCache provisioned by Terraform
      - SPRING_DATA_REDIS_HOST=${TF_VAR_REDIS_ENDPOINT:-localhost}
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - app-network

  # ==========================================
  # Code Quality (SonarQube)
  # ==========================================
  sonarqube:
    image: sonarqube:community
    container_name: amazon-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - app-network

  # ==========================================
  # Observability (Datadog Agent)
  # ==========================================
  datadog:
    image: gcr.io/datadoghq/agent:7
    container_name: amazon-datadog
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=us5.datadoghq.com
      - DD_ENV=dev
      - DD_APPSEC_ENABLED=true
      - DD_IAST_ENABLED=true
      - DD_APPSEC_SCA_ENABLED=true
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_LOGS_CONFIG_AUTO_MULTI_LINE_DETECTION=true
      - DD_CONTAINER_EXCLUDE_LOGS=name:amazon-datadog
      - DD_PROFILING_ENABLED=auto
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
      - IPC_LOCK
      - CHOWN
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  # MySQL volume removed as data is now stored in AWS RDS
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
